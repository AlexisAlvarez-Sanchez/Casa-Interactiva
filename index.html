<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final - Casita Interactiva</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        h1 {
            margin-bottom: 10px;
            color: #ecf0f1;
        }
        .instrucciones {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            max-width: 800px;
            text-align: center;
        }
        .instrucciones p {
            margin: 5px 0;
            font-size: 14px;
        }
        .instrucciones span {
            color: #f39c12;
            font-weight: bold;
        }
        main {
            border: 3px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <h1>🏠 Casita Interactiva - Proyecto Final</h1>
    <div class="instrucciones">
        <p><span> MOUSE X:</span> Cambia el ciclo día/noche</p>
        <p><span> MOUSE Y:</span> Controla la altura del sol/luna</p>
        <p><span> CLICK:</span> Abre/cierra la puerta</p>
        <p><span> ESPACIO:</span> Pausa/reanuda la animación</p>
    </div>
    <main></main>
    <script src="sketch.js"></script>
</body>
</html>
